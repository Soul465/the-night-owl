name: Song Spotlight Submission
description: Submit your song for a weekly featured write-up on The Night Owl
title: "[Song Spotlight] "
labels: ["song-spotlight"]
body:
  - type: input
    id: producer-name
    attributes:
      label: Artist / Producer Name
      placeholder: "Your name or artist name"
    validations:
      required: true
  - type: input
    id: beat-link
    attributes:
      label: Song Link
      description: SoundCloud, YouTube, Spotify, or Google Drive link
      placeholder: "https://"
    validations:
      required: true
  - type: dropdown
    id: genre
    attributes:
      label: Genre / Subgenre
      options:
        - Trap
        - Boom Bap
        - Drill
        - R&B
        - Bounce
        - Rage
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Tell us about the track
      description: BPM, key, what inspired it, the story behind it
      placeholder: "140 BPM, Cm, inspired by..."
